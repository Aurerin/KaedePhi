name: Release Gui

on:
  push:
    branches:
      - main
    paths:
      - 'KaedePhi.Tool.Gui/KaedePhi.Tool.Gui.csproj'
      - 'Directory.Build.props'
  workflow_dispatch:
    inputs:
      force_release_type:
        description: '强制指定发版类型（auto = 自动检测）'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - release
          - prerelease
          - skip

permissions:
  contents: write
  packages: write

jobs:
  build-gui:
    runs-on: ubuntu-latest
    outputs:
      build_type: ${{ steps.version.outputs.build_type }}
      version: ${{ steps.version.outputs.version }}
      change_level: ${{ steps.version.outputs.change_level }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect version change
        id: version
        run: |
          CSPROJ="KaedePhi.Tool.Gui/KaedePhi.Tool.Gui.csproj"
          PROPS="Directory.Build.props"
          FORCE="${{ github.event.inputs.force_release_type || 'auto' }}"

          get_version() {
            grep -oP '<Version>\K[^<]+' "$1" 2>/dev/null || echo ""
          }

          CURRENT=$(get_version "$CSPROJ")
          if [ -z "$CURRENT" ]; then
            CURRENT=$(get_version "$PROPS")
          fi
          if [ -z "$CURRENT" ]; then
            echo "::warning::Could not extract version from $CSPROJ or $PROPS, skipping."
            echo "build_type=skip" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Handle forced release types (workflow_dispatch)
          if [ "$FORCE" = "release" ]; then
            echo "Forced release type: release"
            echo "build_type=release" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            echo "change_level=minor" >> $GITHUB_OUTPUT
            exit 0
          elif [ "$FORCE" = "prerelease" ]; then
            echo "Forced release type: prerelease"
            echo "build_type=prerelease" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            echo "change_level=patch" >> $GITHUB_OUTPUT
            exit 0
          elif [ "$FORCE" = "skip" ]; then
            echo "Forced skip"
            echo "build_type=skip" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Auto detection: compare version with previous commit
          PREVIOUS=$(git show HEAD~1:"$CSPROJ" 2>/dev/null | grep -oP '<Version>\K[^<]+' || echo "")
          if [ -z "$PREVIOUS" ]; then
            PREVIOUS=$(git show HEAD~1:"$PROPS" 2>/dev/null | grep -oP '<Version>\K[^<]+' || echo "")
          fi
          echo "Current version:  $CURRENT"
          echo "Previous version: $PREVIOUS"

          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo ".csproj changed but version is unchanged ($CURRENT), skipping release build."
            echo "build_type=skip" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse version components (x.y.z)
          CUR_MAJOR=$(echo "$CURRENT"  | cut -d'.' -f1)
          CUR_MINOR=$(echo "$CURRENT"  | cut -d'.' -f2)
          PREV_MAJOR=$(echo "$PREVIOUS" | cut -d'.' -f1)
          PREV_MINOR=$(echo "$PREVIOUS" | cut -d'.' -f2)

          if [ -z "$PREVIOUS" ] || [ "$CUR_MAJOR" != "$PREV_MAJOR" ]; then
            echo "Major version changed ($PREVIOUS → $CURRENT) → Release"
            echo "build_type=release" >> $GITHUB_OUTPUT
            echo "change_level=major" >> $GITHUB_OUTPUT
          elif [ "$CUR_MINOR" != "$PREV_MINOR" ]; then
            echo "Minor version changed ($PREVIOUS → $CURRENT) → Release"
            echo "build_type=release" >> $GITHUB_OUTPUT
            echo "change_level=minor" >> $GITHUB_OUTPUT
          else
            echo "Patch version changed ($PREVIOUS → $CURRENT) → PreRelease"
            echo "build_type=prerelease" >> $GITHUB_OUTPUT
            echo "change_level=patch" >> $GITHUB_OUTPUT
          fi
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Setup .NET
        if: steps.version.outputs.build_type != 'skip'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and publish Gui
        if: steps.version.outputs.build_type != 'skip'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_TYPE: ${{ steps.version.outputs.build_type }}
          VERSION: ${{ steps.version.outputs.version }}
          CHANGE_LEVEL: ${{ steps.version.outputs.change_level }}
        run: |
          CSPROJ="KaedePhi.Tool.Gui/KaedePhi.Tool.Gui.csproj"
          output_dir="./artifacts/gui"
          runtimes=("win-x64" "linux-x64")

          [ "$BUILD_TYPE" = "release" ] && CONFIG="Release" || CONFIG="PreRelease"
          echo "Build configuration: $CONFIG"

          mkdir -p "$output_dir"

          for runtime in "${runtimes[@]}"; do
            echo "Building net10.0 / $runtime ($CONFIG)..."
            dotnet publish "$CSPROJ" \
              -c "$CONFIG" \
              -f net10.0 \
              -r "$runtime" \
              --self-contained false \
              -o "$output_dir/net10.0-$runtime-fdd"

            cd "$output_dir/net10.0-$runtime-fdd"
            zip -r "../KaedePhi.Tool.Gui-net10.0-$runtime-fdd.zip" .
            cd -
          done

      - name: Upload build artifacts
        if: steps.version.outputs.build_type != 'skip'
        uses: actions/upload-artifact@v4
        with:
          name: gui-build-${{ github.sha }}
          path: ./artifacts/gui/*.zip
          if-no-files-found: warn
          retention-days: 1

  build-installer:
    needs: build-gui
    if: needs.build-gui.outputs.build_type != 'skip'
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gui-build-${{ github.sha }}
          path: ./artifacts/gui

      - name: Extract Windows build
        shell: pwsh
        run: |
          $version = "${{ needs.build-gui.outputs.version }}"
          $zipFile = "./artifacts/gui/KaedePhi.Tool.Gui-net10.0-win-x64-fdd.zip"
          $publishDir = "./publish"
          
          Expand-Archive -Path $zipFile -DestinationPath $publishDir
          
          # 设置环境变量供 Inno Setup 使用
          echo "KAEPHI_VERSION=$version" >> $env:GITHUB_ENV
          echo "KAEPHI_PROJECT_DIR=$env:GITHUB_WORKSPACE" >> $env:GITHUB_ENV
          echo "KAEPHI_PUBLISH_DIR=$env:GITHUB_WORKSPACE\$publishDir" >> $env:GITHUB_ENV

      - name: Build installer with Inno Setup
        uses: Minionguyjpro/inno-setup-action@v1.0.0
        with:
          path: SetupGenScript.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-installer-${{ github.sha }}
          path: ./setup/*.exe
          if-no-files-found: warn
          retention-days: 1

  create-release:
    needs: [build-gui, build-installer]
    if: needs.build-gui.outputs.build_type != 'skip'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_TYPE: ${{ needs.build-gui.outputs.build_type }}
          VERSION: ${{ needs.build-gui.outputs.version }}
          CHANGE_LEVEL: ${{ needs.build-gui.outputs.change_level }}
        run: |
          TAG="Gui-v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG already exists, skipping release creation."
            exit 0
          fi

          # ── Changelog generation ──────────────────────────────────────────
          CUR_MAJOR=$(echo "$VERSION" | cut -d'.' -f1)
          CUR_MINOR=$(echo "$VERSION" | cut -d'.' -f2)

          BASE_TAG=""
          while read -r tag; do
            tver="${tag#Gui-v}"
            tmaj=$(echo "$tver" | cut -d'.' -f1)
            tmin=$(echo "$tver" | cut -d'.' -f2)
            case "$CHANGE_LEVEL" in
              patch)
                [ "$tmaj" = "$CUR_MAJOR" ] && [ "$tmin" = "$CUR_MINOR" ] && { BASE_TAG="$tag"; break; }
                ;;
              minor)
                { [ "$tmaj" = "$CUR_MAJOR" ] && [ "$tmin" != "$CUR_MINOR" ]; } \
                  || [ "$tmaj" != "$CUR_MAJOR" ] && { BASE_TAG="$tag"; break; }
                ;;
              major)
                [ "$tmaj" != "$CUR_MAJOR" ] && { BASE_TAG="$tag"; break; }
                ;;
            esac
          done < <(git tag --list 'Gui-v*' | sed 's/^Gui-v//' | sort -rV | sed 's/^/Gui-v/')

          NOTES_FILE=$(mktemp)
          echo "## Changelog" >> "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"
          if [ -n "$BASE_TAG" ]; then
            echo "_Changes since \`${BASE_TAG}\`_" >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            git log "${BASE_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> "$NOTES_FILE"
          else
            echo "_Full history (no previous Gui tag found)_" >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            git log HEAD --pretty=format:"- %s (%h)" --no-merges >> "$NOTES_FILE"
          fi
          
          echo "" >> "$NOTES_FILE"
          echo "## 下载说明" >> "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"
          echo "- **便携版**：下载 `KaedePhi.Tool.Gui-net10.0-*-fdd.zip`，解压后直接运行" >> "$NOTES_FILE"
          echo "- **安装版**：下载 `KaedePhi-{VERSION}.exe` 安装程序" >> "$NOTES_FILE"
          # ──────────────────────────────────────────────────────────────────

          git tag "$TAG"
          git push origin "$TAG"

          # 收集所有产物
          RELEASE_FILES=()
          for dir in ./artifacts/gui-*/; do
            for file in "$dir"*; do
              [ -f "$file" ] && RELEASE_FILES+=("$file")
            done
          done

          RELEASE_FLAGS=("$TAG" --title "Gui v${VERSION}" --notes-file "$NOTES_FILE")
          [ "$BUILD_TYPE" = "prerelease" ] && RELEASE_FLAGS+=(--prerelease) || RELEASE_FLAGS+=(--latest)
          RELEASE_FLAGS+=("${RELEASE_FILES[@]}")

          gh release create "${RELEASE_FLAGS[@]}"
          echo "✅ Created $BUILD_TYPE release: Gui v${VERSION}"
