name: Nightly Gui Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-gui:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          PROPS="Directory.Build.props"
          VERSION=$(grep -oP '<Version>\K[^<]+' "$PROPS" 2>/dev/null || echo "0.0.0")
          HASH=$(git rev-parse --short HEAD)
          echo "version=${VERSION}+nightly.${HASH}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Gui (Debug / Nightly)
        run: |
          CSPROJ="KaedePhi.Tool.Gui/KaedePhi.Tool.Gui.csproj"
          output_dir="./artifacts/gui"
          runtimes=("win-x64" "linux-x64")

          mkdir -p "$output_dir"

          for runtime in "${runtimes[@]}"; do
            echo "Building net10.0 / $runtime (Debug)..."
            dotnet publish "$CSPROJ" \
              -c Debug \
              -f net10.0 \
              -r "$runtime" \
              --self-contained false \
              -o "$output_dir/net10.0-$runtime"

            cd "$output_dir/net10.0-$runtime"
            zip -r "../KaedePhi.Tool.Gui-nightly-net10.0-$runtime.zip" .
            cd -
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-nightly-build-${{ github.sha }}
          path: ./artifacts/gui/*.zip
          if-no-files-found: warn
          retention-days: 1

  build-installer:
    needs: build-gui
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gui-nightly-build-${{ github.sha }}
          path: ./artifacts/gui

      - name: Extract Windows build
        shell: pwsh
        run: |
          $version = "${{ needs.build-gui.outputs.version }}"
          $zipFile = "./artifacts/gui/KaedePhi.Tool.Gui-nightly-net10.0-win-x64.zip"
          $publishDir = "./publish"
          
          Expand-Archive -Path $zipFile -DestinationPath $publishDir
          
          # 设置环境变量供 Inno Setup 使用
          echo "KAEPHI_VERSION=$version" >> $env:GITHUB_ENV
          echo "KAEPHI_PROJECT_DIR=$env:GITHUB_WORKSPACE" >> $env:GITHUB_ENV
          echo "KAEPHI_PUBLISH_DIR=$env:GITHUB_WORKSPACE\$publishDir" >> $env:GITHUB_ENV

      - name: Build installer with Inno Setup
        uses: Minionguyjpro/inno-setup-action@v1.0.0
        with:
          path: SetupGenScript.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-nightly-installer-${{ github.sha }}
          path: ./setup/*.exe
          if-no-files-found: warn
          retention-days: 7

  upload-nightly:
    needs: [build-gui, build-installer]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v3
        with:
          name: gui-nightly-${{ github.sha }}
          path: |
            ./artifacts/gui-nightly-build-*/*.zip
            ./artifacts/gui-nightly-installer-*/*.exe
          if-no-files-found: warn
          retention-days: 7
