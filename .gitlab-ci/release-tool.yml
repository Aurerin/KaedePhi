# release-tool 只需要一个 job，与 release-core 结构相同
# 触发条件：main 分支 push 且改动了 Tool csproj 或 Directory.Build.props，
#           或通过 Web UI 手动触发（可通过变量 CI_TEST_BUILD=true 只构建不发版）

release-tool:
  stage: release
  image: mcr.microsoft.com/dotnet/sdk:10.0
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - KaedePhi.Tool/KaedePhi.Tool.csproj
        - Directory.Build.props
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  variables:
    CI_TEST_BUILD: "false"
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
  script:
    - |
      CSPROJ="KaedePhi.Tool/KaedePhi.Tool.csproj"
      PROPS="Directory.Build.props"

      get_version() {
        grep -oP '<Version>\K[^<]+' "$1" 2>/dev/null || echo ""
      }

      is_prerelease() {
        local patch=$(echo "$1" | cut -d'.' -f3)
        local build=$(echo "$1" | cut -d'.' -f4)
        if [ "$patch" != "0" ] || [ ! -z "$build" -a "$build" != "0" ]; then echo "true"; else echo "false"; fi
      }

      VERSION=$(get_version "$CSPROJ")
      if [ -z "$VERSION" ]; then
        VERSION=$(get_version "$PROPS")
      fi
      if [ -z "$VERSION" ]; then echo "Could not extract version from $CSPROJ or $PROPS, skipping."; exit 0; fi

      TAG="Tool-v${VERSION}"

      # 安装 net8.0 + net9.0 SDK（sdk:10.0 镜像只含 10.0）
      for ch in "8.0" "9.0"; do
        major="${ch%%.*}"
        if ! dotnet --list-sdks 2>/dev/null | grep -q "^${major}\."; then
          echo "Installing .NET SDK $ch..."
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash -s -- \
            --channel "$ch" --install-dir /usr/share/dotnet
        fi
      done

      mkdir -p ./artifacts

      IS_TEST_BUILD=${CI_TEST_BUILD:-false}
      SHOULD_RELEASE="true"

      if [ "$IS_TEST_BUILD" = "true" ]; then
        echo "Test build mode - skipping release for Tool"
        dotnet build "$CSPROJ" -c Release
        dotnet pack "$CSPROJ" -c Release --no-build -o ./artifacts
        exit 0
      fi

      if git rev-parse "$TAG" >/dev/null 2>&1; then
        echo "Tag $TAG already exists, skipping..."
        exit 0
      fi

      dotnet build "$CSPROJ" -c Release
      dotnet pack "$CSPROJ" -c Release --no-build -o ./artifacts

      if [ "$SHOULD_RELEASE" != "true" ]; then
        echo "Skipping release creation (build only mode)"
        exit 0
      fi

      PRERELEASE=$(is_prerelease "$VERSION")
      git config user.name "GitLab CI"
      git config user.email "gitlab-ci@noreply"
      git tag "$TAG"
      git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$TAG" --force

      ASSETS=""
      for nupkg in ./artifacts/*.nupkg; do
        FNAME=$(basename "$nupkg")
        ASSETS="${ASSETS}{\"name\":\"${FNAME}\",\"url\":\"${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/artifacts/${FNAME}\",\"link_type\":\"other\"},"
      done
      ASSETS="[${ASSETS%,}]"

      BODY=$(cat <<EOF
      {
        "name": "Tool v${VERSION}",
        "tag_name": "${TAG}",
        "description": "自动发布 Tool 版本 ${VERSION}",
        "assets": { "links": ${ASSETS} }
      }
      EOF
      )

      curl -sf -X POST \
        -H "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "$BODY" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"

      echo "Created release: Tool v${VERSION} (prerelease: $PRERELEASE)"
  artifacts:
    paths:
      - artifacts/*.nupkg
    expire_in: 7 days
