stages:
  - release

release-core:
  stage: release
  image: mcr.microsoft.com/dotnet/sdk:10.0
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - KaedePhi.Core/KaedePhi.Core.csproj
        - Directory.Build.props
    - if: $CI_PIPELINE_SOURCE == "web"
  variables:
    CI_TEST_BUILD: "false"
    CI_CREATE_RELEASE: "true"
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -L https://gitlab.com/gitlab-org/release-cli/-/releases/permalink/latest/downloads/release-cli-linux-amd64 -o /usr/local/bin/release-cli
    - chmod +x /usr/local/bin/release-cli
    - git config --global user.name "GitLab CI"
    - git config --global user.email "gitlab-ci@example.com"
  script:
    - |
      CSPROJ="KaedePhi.Core/KaedePhi.Core.csproj"
      PROPS="Directory.Build.props"

      get_version() {
        grep -oP '<Version>\K[^<]+' "$1" 2>/dev/null || echo ""
      }

      is_prerelease() {
        local patch=$(echo "$1" | cut -d'.' -f3)
        local build=$(echo "$1" | cut -d'.' -f4)
        if [ "$patch" != "0" ] || [ ! -z "$build" -a "$build" != "0" ]; then echo "true"; else echo "false"; fi
      }

      VERSION=$(get_version "$CSPROJ")
      if [ -z "$VERSION" ]; then
        VERSION=$(get_version "$PROPS")
      fi
      if [ -z "$VERSION" ]; then echo "Could not extract version from $CSPROJ or $PROPS, skipping."; exit 0; fi

      TAG="Core-v${VERSION}"
      mkdir -p ./artifacts

      IS_TEST_BUILD=${CI_TEST_BUILD:-false}
      SHOULD_RELEASE=${CI_CREATE_RELEASE:-true}

      if [ "$IS_TEST_BUILD" = "true" ]; then
        echo "Test build mode - skipping release for Core"
        dotnet build "$CSPROJ" -c Release
        dotnet pack "$CSPROJ" -c Release --no-build -o ./artifacts
        exit 0
      fi

      if git rev-parse "$TAG" >/dev/null 2>&1; then
        echo "Tag $TAG already exists, skipping..."
        exit 0
      fi

      dotnet build "$CSPROJ" -c Release
      dotnet pack "$CSPROJ" -c Release --no-build -o ./artifacts

      if [ "$SHOULD_RELEASE" != "true" ]; then
        echo "Skipping release creation (build only mode)"
        exit 0
      fi

      PRERELEASE=$(is_prerelease "$VERSION")
      git tag "$TAG"
      git push origin "$TAG" --force

      RELEASE_ARGS=("$TAG" --name "Core v${VERSION}" --description "自动发布 Core 版本 $VERSION")
      [ "$PRERELEASE" = "true" ] && RELEASE_ARGS+=(--pre-release)
      RELEASE_ARGS+=(--assets-link "{\"name\":\"nupkg\",\"url\":\"${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/artifacts/*.nupkg\"}")

      release-cli create "${RELEASE_ARGS[@]}"
      echo "Created release: Core v${VERSION} (prerelease: $PRERELEASE)"
  artifacts:
    paths:
      - ./artifacts/*.nupkg
    expire_in: 7 days