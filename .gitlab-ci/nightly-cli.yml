nightly-cli:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  before_script:
    - apt-get update && apt-get install -y zip
  script:
    - |
      CSPROJ="KaedePhi.Tool.Cli/KaedePhi.Tool.Cli.csproj"
      output_dir="./artifacts/cli"
      frameworks=("net8.0" "net10.0")
      runtimes=("win-x64" "linux-x64")

      mkdir -p "$output_dir"

      for framework in "${frameworks[@]}"; do
        for runtime in "${runtimes[@]}"; do
          echo "Building $framework / $runtime (Debug)..."
          dotnet publish "$CSPROJ" \
            -c Debug \
            -f "$framework" \
            -r "$runtime" \
            --self-contained false \
            -o "$output_dir/$framework-$runtime"

          cd "$output_dir/$framework-$runtime"
          zip -r "../KaedePhi.Tool.Cli-nightly-$framework-$runtime.zip" .
          cd -
        done
      done
  artifacts:
    paths:
      - ./artifacts/cli/*.zip
    expire_in: 7 days
