# release-gui 分为四个独立 job：
#   1. detect-gui-version  - 检测版本变更（linux docker）
#   2. build-gui-release   - 构建 GUI zip 产物（linux docker）
#   3. build-gui-installer - 构建安装包（windows runner，自行安装 Inno Setup）
#   4. release-gui         - 创建 GitLab Release（linux docker）

detect-gui-version:
  stage: detect
  image: mcr.microsoft.com/dotnet/sdk:10.0
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - KaedePhi.Tool.Gui/KaedePhi.Tool.Gui.csproj
        - Directory.Build.props
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  variables:
    CI_RELEASE_TYPE: "auto"
  script:
    - |
      CSPROJ="KaedePhi.Tool.Gui/KaedePhi.Tool.Gui.csproj"
      PROPS="Directory.Build.props"
      FORCE="${CI_RELEASE_TYPE:-auto}"

      get_version() {
        grep -oP '<Version>\K[^<]+' "$1" 2>/dev/null || echo ""
      }

      CURRENT=$(get_version "$CSPROJ")
      if [ -z "$CURRENT" ]; then
        CURRENT=$(get_version "$PROPS")
      fi
      if [ -z "$CURRENT" ]; then
        echo "Warning: Could not extract version from $CSPROJ or $PROPS, skipping."
        echo "skip" > build_type.txt
        exit 0
      fi

      if [ "$FORCE" = "release" ]; then
        echo "release" > build_type.txt
        echo "$CURRENT" > version.txt
        echo "minor" > change_level.txt
        exit 0
      elif [ "$FORCE" = "prerelease" ]; then
        echo "prerelease" > build_type.txt
        echo "$CURRENT" > version.txt
        echo "patch" > change_level.txt
        exit 0
      elif [ "$FORCE" = "skip" ]; then
        echo "skip" > build_type.txt
        exit 0
      fi

      PREVIOUS=$(git show HEAD~1:"$CSPROJ" 2>/dev/null | grep -oP '<Version>\K[^<]+' || echo "")
      if [ -z "$PREVIOUS" ]; then
        PREVIOUS=$(git show HEAD~1:"$PROPS" 2>/dev/null | grep -oP '<Version>\K[^<]+' || echo "")
      fi
      echo "Current version:  $CURRENT"
      echo "Previous version: $PREVIOUS"

      if [ "$CURRENT" = "$PREVIOUS" ]; then
        echo "Version unchanged ($CURRENT), skipping."
        echo "skip" > build_type.txt
        exit 0
      fi

      CUR_MAJOR=$(echo "$CURRENT"  | cut -d'.' -f1)
      CUR_MINOR=$(echo "$CURRENT"  | cut -d'.' -f2)
      PREV_MAJOR=$(echo "$PREVIOUS" | cut -d'.' -f1)
      PREV_MINOR=$(echo "$PREVIOUS" | cut -d'.' -f2)

      if [ -z "$PREVIOUS" ] || [ "$CUR_MAJOR" != "$PREV_MAJOR" ]; then
        echo "release" > build_type.txt
        echo "major" > change_level.txt
      elif [ "$CUR_MINOR" != "$PREV_MINOR" ]; then
        echo "release" > build_type.txt
        echo "minor" > change_level.txt
      else
        echo "prerelease" > build_type.txt
        echo "patch" > change_level.txt
      fi
      echo "$CURRENT" > version.txt
  artifacts:
    paths:
      - build_type.txt
      - version.txt
      - change_level.txt
    expire_in: 1 hour

build-gui-release:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  needs:
    - job: detect-gui-version
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - KaedePhi.Tool.Gui/KaedePhi.Tool.Gui.csproj
        - Directory.Build.props
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
  script:
    - |
      BUILD_TYPE=$(cat build_type.txt)
      if [ "$BUILD_TYPE" = "skip" ]; then
        echo "Skipping build."
        exit 0
      fi

      CSPROJ="KaedePhi.Tool.Gui/KaedePhi.Tool.Gui.csproj"
      output_dir="./artifacts/gui"
      runtimes=("win-x64" "linux-x64")

      [ "$BUILD_TYPE" = "release" ] && CONFIG="Release" || CONFIG="PreRelease"
      echo "Build configuration: $CONFIG"

      mkdir -p "$output_dir"

      for runtime in "${runtimes[@]}"; do
        echo "Building net10.0 / $runtime ($CONFIG)..."
        dotnet publish "$CSPROJ" \
          -c "$CONFIG" \
          -f net10.0 \
          -r "$runtime" \
          --self-contained false \
          -o "$output_dir/net10.0-$runtime-fdd"

        cd "$output_dir/net10.0-$runtime-fdd"
        zip -r "../KaedePhi.Tool.Gui-net10.0-$runtime-fdd.zip" .
        cd -
      done
  artifacts:
    paths:
      - artifacts/gui/*.zip
    expire_in: 1 hour

build-gui-installer:
  stage: installer
  tags: [windows]
  needs:
    - job: detect-gui-version
      artifacts: true
    - job: build-gui-release
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - KaedePhi.Tool.Gui/KaedePhi.Tool.Gui.csproj
        - Directory.Build.props
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  script:
    - |
      $ErrorActionPreference = "Stop"
      $buildType = (Get-Content build_type.txt -Raw).Trim()
      if ($buildType -eq "skip") {
        Write-Host "Skipping installer build."
        exit 0
      }

      $version = (Get-Content version.txt -Raw).Trim()
      $zipFile = "./artifacts/gui/KaedePhi.Tool.Gui-net10.0-win-x64-fdd.zip"
      $publishDir = (Resolve-Path ".").Path + "\publish"

      Expand-Archive -Path $zipFile -DestinationPath $publishDir -Force

      $env:KAEPHI_VERSION = $version
      $env:KAEPHI_PROJECT_DIR = (Resolve-Path ".").Path
      $env:KAEPHI_PUBLISH_DIR = $publishDir

      # 下载并静默安装 Inno Setup（与 GitHub inno-setup-action 行为一致）
      $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
      if (-not (Test-Path $isccPath)) {
        Write-Host "Installing Inno Setup..."
        $installer = "$env:TEMP\innosetup.exe"
        Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe?site=1" -OutFile $installer
        Start-Process -FilePath $installer -ArgumentList "/VERYSILENT /NORESTART /SUPPRESSMSGBOXES" -Wait
        Remove-Item $installer
      }
      & $isccPath SetupGenScript.iss
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
  artifacts:
    paths:
      - setup/*.exe
    expire_in: 1 hour

release-gui:
  stage: release
  image: mcr.microsoft.com/dotnet/sdk:10.0
  needs:
    - job: detect-gui-version
      artifacts: true
    - job: build-gui-release
      artifacts: true
    - job: build-gui-installer
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - KaedePhi.Tool.Gui/KaedePhi.Tool.Gui.csproj
        - Directory.Build.props
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
  script:
    - |
      BUILD_TYPE=$(cat build_type.txt)
      VERSION=$(cat version.txt)
      CHANGE_LEVEL=$(cat change_level.txt)

      if [ "$BUILD_TYPE" = "skip" ]; then
        echo "Skipping release creation."
        exit 0
      fi

      TAG="Gui-v${VERSION}"

      if git rev-parse "$TAG" >/dev/null 2>&1; then
        echo "Warning: Tag $TAG already exists, skipping."
        exit 0
      fi

      CUR_MAJOR=$(echo "$VERSION" | cut -d'.' -f1)
      CUR_MINOR=$(echo "$VERSION" | cut -d'.' -f2)

      BASE_TAG=""
      while read -r tag; do
        tver="${tag#Gui-v}"
        tmaj=$(echo "$tver" | cut -d'.' -f1)
        tmin=$(echo "$tver" | cut -d'.' -f2)
        case "$CHANGE_LEVEL" in
          patch)
            [ "$tmaj" = "$CUR_MAJOR" ] && [ "$tmin" = "$CUR_MINOR" ] && { BASE_TAG="$tag"; break; }
            ;;
          minor)
            { [ "$tmaj" = "$CUR_MAJOR" ] && [ "$tmin" != "$CUR_MINOR" ]; } \
              || [ "$tmaj" != "$CUR_MAJOR" ] && { BASE_TAG="$tag"; break; }
            ;;
          major)
            [ "$tmaj" != "$CUR_MAJOR" ] && { BASE_TAG="$tag"; break; }
            ;;
        esac
      done < <(git tag --list 'Gui-v*' | sed 's/^Gui-v//' | sort -rV | sed 's/^/Gui-v/')

      NOTES_FILE=$(mktemp)
      echo "## Changelog" >> "$NOTES_FILE"
      echo "" >> "$NOTES_FILE"
      if [ -n "$BASE_TAG" ]; then
        echo "_Changes since \`${BASE_TAG}\`_" >> "$NOTES_FILE"
        echo "" >> "$NOTES_FILE"
        git log "${BASE_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> "$NOTES_FILE"
      else
        echo "_Full history (no previous Gui tag found)_" >> "$NOTES_FILE"
        echo "" >> "$NOTES_FILE"
        git log HEAD --pretty=format:"- %s (%h)" --no-merges >> "$NOTES_FILE"
      fi
      echo "" >> "$NOTES_FILE"
      echo "## 下载说明" >> "$NOTES_FILE"
      echo "" >> "$NOTES_FILE"
      echo "- **便携版**：下载 \`KaedePhi.Tool.Gui-net10.0-*-fdd.zip\`，解压后直接运行" >> "$NOTES_FILE"
      echo "- **安装版**：下载 \`KaedePhi-${VERSION}.exe\` 安装程序" >> "$NOTES_FILE"

      git config user.name "GitLab CI"
      git config user.email "gitlab-ci@noreply"
      git tag "$TAG"
      git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$TAG"

      NOTES=$(sed -e 's/\\/\\\\/g' -e 's/"/\\"/g' -e ':a' -e 'N' -e '$!ba' -e 's/\n/\\n/g' "$NOTES_FILE")

      EXE_NAME=$(ls ./setup/*.exe 2>/dev/null | head -1 | xargs -r basename)
      [ -z "$EXE_NAME" ] && EXE_NAME="KaedePhi-${VERSION}.exe"

      ASSETS=""
      ASSETS="${ASSETS}{\"name\":\"KaedePhi.Tool.Gui-net10.0-win-x64-fdd.zip\",\"url\":\"${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/artifacts/gui/KaedePhi.Tool.Gui-net10.0-win-x64-fdd.zip\",\"link_type\":\"other\"},"
      ASSETS="${ASSETS}{\"name\":\"KaedePhi.Tool.Gui-net10.0-linux-x64-fdd.zip\",\"url\":\"${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/artifacts/gui/KaedePhi.Tool.Gui-net10.0-linux-x64-fdd.zip\",\"link_type\":\"other\"},"
      ASSETS="${ASSETS}{\"name\":\"${EXE_NAME}\",\"url\":\"${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/setup/${EXE_NAME}\",\"link_type\":\"other\"}"
      ASSETS="[${ASSETS}]"

      BODY="{\"name\":\"Gui v${VERSION}\",\"tag_name\":\"${TAG}\",\"description\":\"${NOTES}\",\"assets\":{\"links\":${ASSETS}}}"

      curl -sf -X POST \
        -H "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "$BODY" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"

      echo "Created $BUILD_TYPE release: Gui v${VERSION}"
  artifacts:
    paths:
      - artifacts/gui/*.zip
      - setup/*.exe
    expire_in: 7 days
