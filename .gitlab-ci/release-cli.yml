# release-cli 分为三个独立 job：
#   1. detect-cli-version  - 检测版本变更（linux docker）
#   2. build-cli           - 构建 CLI 产物（linux docker）
#   3. release-cli         - 创建 GitLab Release（linux docker）
#
# 触发条件：main 分支 push 且改动了 CLI csproj 或 Directory.Build.props，
#           或通过 Web UI 手动触发（可通过变量 CI_RELEASE_TYPE 控制：auto/release/prerelease/skip）

detect-cli-version:
  stage: detect
  image: mcr.microsoft.com/dotnet/sdk:10.0
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - KaedePhi.Tool.Cli/KaedePhi.Tool.Cli.csproj
        - Directory.Build.props
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  variables:
    CI_RELEASE_TYPE: "auto"
  script:
    - |
      CSPROJ="KaedePhi.Tool.Cli/KaedePhi.Tool.Cli.csproj"
      PROPS="Directory.Build.props"
      FORCE="${CI_RELEASE_TYPE:-auto}"

      get_version() {
        grep -oP '<Version>\K[^<]+' "$1" 2>/dev/null || echo ""
      }

      CURRENT=$(get_version "$CSPROJ")
      if [ -z "$CURRENT" ]; then
        CURRENT=$(get_version "$PROPS")
      fi
      if [ -z "$CURRENT" ]; then
        echo "Warning: Could not extract version from $CSPROJ or $PROPS, skipping."
        echo "skip" > build_type.txt
        exit 0
      fi

      if [ "$FORCE" = "release" ]; then
        echo "Forced release type: release"
        echo "release" > build_type.txt
        echo "$CURRENT" > version.txt
        echo "minor" > change_level.txt
        exit 0
      elif [ "$FORCE" = "prerelease" ]; then
        echo "Forced release type: prerelease"
        echo "prerelease" > build_type.txt
        echo "$CURRENT" > version.txt
        echo "patch" > change_level.txt
        exit 0
      elif [ "$FORCE" = "skip" ]; then
        echo "Forced skip"
        echo "skip" > build_type.txt
        exit 0
      fi

      PREVIOUS=$(git show HEAD~1:"$CSPROJ" 2>/dev/null | grep -oP '<Version>\K[^<]+' || echo "")
      if [ -z "$PREVIOUS" ]; then
        PREVIOUS=$(git show HEAD~1:"$PROPS" 2>/dev/null | grep -oP '<Version>\K[^<]+' || echo "")
      fi
      echo "Current version:  $CURRENT"
      echo "Previous version: $PREVIOUS"

      if [ "$CURRENT" = "$PREVIOUS" ]; then
        echo ".csproj changed but version is unchanged ($CURRENT), skipping release build."
        echo "skip" > build_type.txt
        exit 0
      fi

      CUR_MAJOR=$(echo "$CURRENT"  | cut -d'.' -f1)
      CUR_MINOR=$(echo "$CURRENT"  | cut -d'.' -f2)
      PREV_MAJOR=$(echo "$PREVIOUS" | cut -d'.' -f1)
      PREV_MINOR=$(echo "$PREVIOUS" | cut -d'.' -f2)

      if [ -z "$PREVIOUS" ] || [ "$CUR_MAJOR" != "$PREV_MAJOR" ]; then
        echo "Major version changed ($PREVIOUS → $CURRENT) → Release"
        echo "release" > build_type.txt
        echo "major" > change_level.txt
      elif [ "$CUR_MINOR" != "$PREV_MINOR" ]; then
        echo "Minor version changed ($PREVIOUS → $CURRENT) → Release"
        echo "release" > build_type.txt
        echo "minor" > change_level.txt
      else
        echo "Patch version changed ($PREVIOUS → $CURRENT) → PreRelease"
        echo "prerelease" > build_type.txt
        echo "patch" > change_level.txt
      fi
      echo "$CURRENT" > version.txt
  artifacts:
    paths:
      - build_type.txt
      - version.txt
      - change_level.txt
    expire_in: 1 hour

build-cli:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  needs:
    - job: detect-cli-version
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - KaedePhi.Tool.Cli/KaedePhi.Tool.Cli.csproj
        - Directory.Build.props
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
  script:
    - |
      BUILD_TYPE=$(cat build_type.txt)
      if [ "$BUILD_TYPE" = "skip" ]; then
        echo "Skipping build."
        exit 0
      fi

      # 安装 net8.0 SDK（sdk:10.0 镜像只含 10.0）
      if ! dotnet --list-sdks 2>/dev/null | grep -q "^8\."; then
        echo "Installing .NET SDK 8.0..."
        curl -sSL https://dot.net/v1/dotnet-install.sh | bash -s -- \
          --channel "8.0" --install-dir /usr/share/dotnet
      fi

      CSPROJ="KaedePhi.Tool.Cli/KaedePhi.Tool.Cli.csproj"
      output_dir="./artifacts/cli"
      frameworks=("net8.0" "net10.0")
      runtimes=("win-x64" "linux-x64")

      [ "$BUILD_TYPE" = "release" ] && CONFIG="Release" || CONFIG="PreRelease"
      echo "Build configuration: $CONFIG"

      mkdir -p "$output_dir"

      for framework in "${frameworks[@]}"; do
        for runtime in "${runtimes[@]}"; do
          echo "Building $framework / $runtime ($CONFIG)..."
          dotnet publish "$CSPROJ" \
            -c "$CONFIG" \
            -f "$framework" \
            -r "$runtime" \
            --self-contained false \
            -o "$output_dir/$framework-$runtime-fdd"

          cd "$output_dir/$framework-$runtime-fdd"
          zip -r "../KaedePhi.Tool.Cli-$framework-$runtime-fdd.zip" .
          cd -
        done
      done
  artifacts:
    paths:
      - artifacts/cli/*.zip
    expire_in: 1 hour

release-cli:
  stage: release
  image: mcr.microsoft.com/dotnet/sdk:10.0
  needs:
    - job: detect-cli-version
      artifacts: true
    - job: build-cli
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - KaedePhi.Tool.Cli/KaedePhi.Tool.Cli.csproj
        - Directory.Build.props
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
  script:
    - |
      BUILD_TYPE=$(cat build_type.txt)
      VERSION=$(cat version.txt)
      CHANGE_LEVEL=$(cat change_level.txt)

      if [ "$BUILD_TYPE" = "skip" ]; then
        echo "Skipping release creation."
        exit 0
      fi

      TAG="Cli-v${VERSION}"

      if git rev-parse "$TAG" >/dev/null 2>&1; then
        echo "Warning: Tag $TAG already exists, skipping."
        exit 0
      fi

      CUR_MAJOR=$(echo "$VERSION" | cut -d'.' -f1)
      CUR_MINOR=$(echo "$VERSION" | cut -d'.' -f2)

      BASE_TAG=""
      while read -r tag; do
        tver="${tag#Cli-v}"
        tmaj=$(echo "$tver" | cut -d'.' -f1)
        tmin=$(echo "$tver" | cut -d'.' -f2)
        case "$CHANGE_LEVEL" in
          patch)
            [ "$tmaj" = "$CUR_MAJOR" ] && [ "$tmin" = "$CUR_MINOR" ] && { BASE_TAG="$tag"; break; }
            ;;
          minor)
            { [ "$tmaj" = "$CUR_MAJOR" ] && [ "$tmin" != "$CUR_MINOR" ]; } \
              || [ "$tmaj" != "$CUR_MAJOR" ] && { BASE_TAG="$tag"; break; }
            ;;
          major)
            [ "$tmaj" != "$CUR_MAJOR" ] && { BASE_TAG="$tag"; break; }
            ;;
        esac
      done < <(git tag --list 'Cli-v*' | sed 's/^Cli-v//' | sort -rV | sed 's/^/Cli-v/')

      NOTES_FILE=$(mktemp)
      echo "## Changelog" >> "$NOTES_FILE"
      echo "" >> "$NOTES_FILE"
      if [ -n "$BASE_TAG" ]; then
        echo "_Changes since \`${BASE_TAG}\`_" >> "$NOTES_FILE"
        echo "" >> "$NOTES_FILE"
        git log "${BASE_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> "$NOTES_FILE"
      else
        echo "_Full history (no previous Cli tag found)_" >> "$NOTES_FILE"
        echo "" >> "$NOTES_FILE"
        git log HEAD --pretty=format:"- %s (%h)" --no-merges >> "$NOTES_FILE"
      fi

      git config user.name "GitLab CI"
      git config user.email "gitlab-ci@noreply"
      git tag "$TAG"
      git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$TAG"

      NOTES=$(sed -e 's/\\/\\\\/g' -e 's/"/\\"/g' -e ':a' -e 'N' -e '$!ba' -e 's/\n/\\n/g' "$NOTES_FILE")
      ASSETS=""
      for zip_file in ./artifacts/cli/*.zip; do
        ZIP_NAME=$(basename "$zip_file")
        ASSETS="${ASSETS}{\"name\":\"${ZIP_NAME}\",\"url\":\"${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/artifacts/cli/${ZIP_NAME}\",\"link_type\":\"other\"},"
      done
      ASSETS="[${ASSETS%,}]"

      BODY="{\"name\":\"Cli v${VERSION}\",\"tag_name\":\"${TAG}\",\"description\":\"${NOTES}\",\"assets\":{\"links\":${ASSETS}}}"

      curl -sf -X POST \
        -H "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "$BODY" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"

      echo "Created $BUILD_TYPE release: Cli v${VERSION}"
  artifacts:
    paths:
      - artifacts/cli/*.zip
    expire_in: 7 days
