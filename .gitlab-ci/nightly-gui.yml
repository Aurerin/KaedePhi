# nightly-gui 分为两个独立 job：
#   1. nightly-gui-build      - linux docker，构建 GUI zip 产物
#   2. nightly-gui-installer  - windows runner，构建安装包

nightly-gui-build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
  script:
    - |
      PROPS="Directory.Build.props"
      CSPROJ="KaedePhi.Tool.Gui/KaedePhi.Tool.Gui.csproj"
      output_dir="./artifacts/gui"
      runtimes=("win-x64" "linux-x64")

      VERSION=$(grep -oP '<Version>\K[^<]+' "$PROPS" 2>/dev/null || echo "0.0.0")
      HASH=$(git rev-parse --short HEAD)
      FULL_VERSION="${VERSION}+nightly.${HASH}"
      echo "$FULL_VERSION" > nightly-version.txt

      mkdir -p "$output_dir"

      for runtime in "${runtimes[@]}"; do
        echo "Building net10.0 / $runtime (Debug)..."
        dotnet publish "$CSPROJ" \
          -c Debug \
          -f net10.0 \
          -r "$runtime" \
          --self-contained false \
          -o "$output_dir/net10.0-$runtime"

        cd "$output_dir/net10.0-$runtime"
        zip -r "../KaedePhi.Tool.Gui-nightly-net10.0-$runtime.zip" .
        cd -
      done
  artifacts:
    paths:
      - artifacts/gui/*.zip
      - nightly-version.txt
    expire_in: 7 days

nightly-gui-installer:
  stage: installer
  tags: [windows]
  needs:
    - job: nightly-gui-build
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  script:
    - |
      $ErrorActionPreference = "Stop"

      $version = (Get-Content -Path "nightly-version.txt" -Raw).Trim()
      $zipFile = "./artifacts/gui/KaedePhi.Tool.Gui-nightly-net10.0-win-x64.zip"
      $publishDir = (Resolve-Path ".").Path + "\publish"

      Expand-Archive -Path $zipFile -DestinationPath $publishDir -Force

      $env:KAEPHI_VERSION = $version
      $env:KAEPHI_PROJECT_DIR = (Resolve-Path ".").Path
      $env:KAEPHI_PUBLISH_DIR = $publishDir

      # 下载并静默安装 Inno Setup（与 GitHub inno-setup-action 行为一致）
      $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
      if (-not (Test-Path $isccPath)) {
        Write-Host "Installing Inno Setup..."
        $installer = "$env:TEMP\innosetup.exe"
        Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe?site=1" -OutFile $installer
        Start-Process -FilePath $installer -ArgumentList "/VERYSILENT /NORESTART /SUPPRESSMSGBOXES" -Wait
        Remove-Item $installer
      }
      & $isccPath SetupGenScript.iss
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
  artifacts:
    paths:
      - setup/*.exe
    expire_in: 7 days
